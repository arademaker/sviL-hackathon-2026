name: Build and Deploy Slides

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- --default-toolchain none -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache elan toolchain
        uses: actions/cache@v4
        with:
          path: ~/.elan
          key: elan-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}

      - name: Cache Lake packages
        uses: actions/cache@v4
        with:
          path: .lake/packages
          key: lake-pkg-${{ runner.os }}-${{ hashFiles('lake-manifest.json') }}
          restore-keys: lake-pkg-${{ runner.os }}-

      - name: Cache Lake build artifacts
        uses: actions/cache@v4
        with:
          path: .lake/build
          key: lake-build-${{ runner.os }}-${{ hashFiles('lake-manifest.json', '**/*.lean') }}
          restore-keys: lake-build-${{ runner.os }}-${{ hashFiles('lake-manifest.json') }}-

      - name: Get Mathlib cache
        run: lake exe cache get || true

      - name: Build and generate slides
        run: lake exe svil2026

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _slides

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
